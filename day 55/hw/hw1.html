<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
  <style>
    /* Box Model აჩვენებს როგორ ითვლება ელემენტის ზომა */
    .box {
      width: 200px;          /* კონტენტის სიგანე */
      height: 100px;         /* კონტენტის სიმაღლე */
      background: lightblue; /* კონტენტის შიგთავსის ფერი */
      padding: 20px;         /* შიდა დაშორება კონტენტსა და border-ს შორის */
      border: 5px solid red; /* საზღვარი ელემენტის გარშემო */
      margin: 30px;          /* გარე დაშორება სხვა ელემენტებთან */
    }
  </style>
</head>
<body>
  <!-- ეს div გამოიყენებს box model-ის ყველა ნაწილს -->
  <div class="box">
    Box Model Example
  </div>
  </body>
</html>
