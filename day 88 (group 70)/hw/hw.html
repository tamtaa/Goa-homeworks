<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title></title>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">

<!-- 1️ GRID CARDS -->
<section class="p-10">
<h1 class="text-2xl font-bold mb-6">Grid Cards</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">

<div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">
Card 1 (span 2)
</div>

<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 2</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 3</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 4</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 5</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 6</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 7</div>
<div class="bg-white p-6 rounded-2xl shadow-lg transition hover:scale-105 hover:shadow-2xl">Card 8</div>

</div>
</section>


<!-- 2️ ROUND BUTTON -->
<section class="p-10">
<h1 class="text-2xl font-bold mb-6">Animated Button</h1>

<button class="w-16 h-16 rounded-full bg-blue-500 text-white 
animate-bounce lg:animate-none
hover:bg-purple-500 hover:text-black
focus:ring-4 focus:ring-blue-300 focus:animate-none
transition">
GO
</button>

</section>


<!-- 3️ LOADER -->
<section class="flex items-center justify-center h-64">

<div class="flex gap-3 items-end">

<div class="w-2 h-2 bg-black dark:bg-white rounded-full animate-pulse"></div>

<div class="w-3 h-3 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:200ms]"></div>

<div class="w-4 h-4 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:400ms]"></div>

<div class="w-5 h-5 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:600ms]"></div>

<div class="w-6 h-6 bg-black dark:bg-white rounded-full animate-pulse [animation-delay:800ms]"></div>

</div>

</section>


<!-- 4️ SIDEBAR LAYOUT -->
<div class="relative">

<button onclick="toggleSidebar()" class="m-4 p-2 bg-blue-500 text-white rounded lg:hidden">
Menu
</button>

<aside id="sidebar"
class="fixed top-0 left-0 h-full w-64 bg-white shadow-lg 
transform -translate-x-full lg:translate-x-0
transition-all duration-300">

<nav class="mt-10 space-y-2">

<a href="#" class="block px-6 py-3 bg-gray-200 border-l-4 border-blue-500">
Dashboard
</a>

<a href="#" class="block px-6 py-3 hover:bg-gray-100">
Profile
</a>

<a href="#" class="block px-6 py-3 hover:bg-gray-100">
Settings
</a>

</nav>

</aside>

<main class="p-10 lg:ml-64">
<h1 class="text-2xl font-bold">Content Area</h1>
<p class="mt-4">აქ არის მთავარი კონტენტი.</p>
</main>

</div>


<!-- 5️ ADVANCED CARD -->
<section class="p-10 flex justify-center">

<div class="group bg-white p-10 rounded-2xl shadow-lg 
transform rotate-2 transition duration-500 ease-in-out
hover:scale-105 hover:-translate-y-3">

<h2 class="text-xl font-bold mb-4">Advanced Card</h2>

<p class="mb-4">Hover effect card.</p>

<button class="opacity-0 group-hover:opacity-100 transition bg-blue-500 text-white px-4 py-2 rounded">
Action
</button>

</div>

</section>


<script>
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("-translate-x-full");
}
</script>

</body>
</html>
