<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    
<!-- 1) შექმენი 6 ბარათის (card) სექცია. მობილურზე იყოს 1 სვეტი, ტაბლეტზე 2 სვეტი, ხოლო desktop-ზე 3 სვეტი.
 გამოიყენე grid, grid-cols-1, md:grid-cols-2, lg:grid-cols-3. ბარათებს დაუმატე shadow, rounded-xl, p-4. 
 დამატებით გააკეთე ისე, რომ xl ზომაზე 4 სვეტი გახდეს. -->

 <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-4">
  
    <div class="bg-white shadow rounded-xl p-4"></div>
    <div class="bg-white shadow rounded-xl p-4"></div>
    <div class="bg-white shadow rounded-xl p-4"></div>
    <div class="bg-white shadow rounded-xl p-4"></div>
    <div class="bg-white shadow rounded-xl p-4"></div>
    <div class="bg-white shadow rounded-xl p-4"></div>
 </section>
<!-- 2) შექმენი ელემენტი (მაგალითად წრე ან ღილაკი), რომელსაც ექნება animate-bounce. დაუმატე hover-ზე ფერის შეცვლა (hover:bg-blue-500).
  დამატებითი პირობა: mobile-ზე bounce მუშაობდეს, მაგრამ desktop-ზე არა (გამოიყენე responsive utility-ები). -->
  <div class="w-12 h-12 bg-pink-500 rounded-full animate-bounce md:animate-none hover:bg-blue-500"></div>

<!-- 3) შექმენი loader სამი პატარა წრით ერთმანეთის გვერდით (flex gap-2). თითოეულს ჰქონდეს animate-pulse და rounded-full.
  დაუმატე სხვადასხვა ზომა (w-3 h-3, w-4 h-4, w-5 h-5) და გააკეთე რომ ცენტრში იყოს განლაგებული (flex justify-center items-center h-screen). -->

  
<div class="flex justify-center items-center h-screen gap-2">
  <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
  <div class="w-4 h-4 bg-blue-500 rounded-full animate-pulse"></div>
  <div class="w-5 h-5 bg-blue-500 rounded-full animate-pulse"></div>

</div>

<!-- 4) შექმენი გვერდის layout sidebar-ით. გამოიყენე flex. Sidebar-ს მიეცი w-64, min-h-screen, 
 განსხვავებული ფონი და მენიუს ელემენტებს დაუმატე hover:bg-gray-200 და cursor-pointer. მთავარი კონტენტი იყოს flex-1 p-6. -->
 <div class="flex">
  <!-- Sidebar -->
  <aside class="w-64 min-h-screen bg-gray-100 p-4">
    <ul>
      <li class="p-2 hover:bg-gray-200 cursor-pointer">hello</li>
      <li class="p-2 hover:bg-gray-200 cursor-pointer">hello</li>
      <li class="p-2 hover:bg-gray-200 cursor-pointer">hello</li>
      <li class="p-2 hover:bg-gray-200 cursor-pointer">hello</li>
    </ul>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-6">
    helllllo
  </main>
</div>

<!-- 5) შექმენი card, რომელსაც hover-ზე ექნება transform, rotate-3, scale-105 და transition duration-300.
  hover-ზე ჩრდილიც გაიზარდოს (hover:shadow-2xl). დაამატე რომ ტექსტიც ოდნავ ზემოთ აიწიოს (hover:-translate-y-2). -->
  
<div class="bg-white shadow rounded-xl p-6 transition duration-300 transform hover:rotate-3 hover:scale-105 hover:shadow-2xl hover:-translate-y-2">
  <h3 class="text-lg font-bold">hello</h3>
  <p> helllllo</p>
</div>

<!-- 6) შექმენი ღილაკი icon-ით. hover-ზე icon დატრიალდეს 180 გრადუსით (hover:rotate-180). 
 გამოიყენე transition-transform duration-500. დამატებით active-ზე დაამატე scale-90, ხოლო hover-ზე ღილაკის ფერი შეიცვალოს. -->
 <button class="flex items-center gap-2 bg-green-500 text-white px-4 py-2 rounded transition-colors duration-300 hover:bg-green-600 active:scale-90">
  helllllo
  <svg class="w-5 h-5 transition-transform duration-500 hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path>
  </svg>
</button>

<!-- 7)აწყეთ გაკვეთილზე, როგორც გაჩვენეთ მაგდაგვარი sidebar დატვირთეთ მეტი ფუნქცით  და ასევე დაამატეთ მეტი content-ი  main-ში. -->
     <aside class="w-64 bg-white shadow-lg p-6 flex flex-col">
      <h2 class="text-2xl font-bold mb-6">მენიუ</h2>
      <nav class="flex-1">
        <ul class="space-y-4">
          <li><a href="#" class="block py-2 px-4 rounded hover:bg-blue-500 hover:text-white transition">მთავარი</a></li>
          <li><a href="#" class="block py-2 px-4 rounded hover:bg-blue-500 hover:text-white transition">პროფილი</a></li>
          <li><a href="#" class="block py-2 px-4 rounded hover:bg-blue-500 hover:text-white transition">შეტყობინებები</a></li>
          <li><a href="#" class="block py-2 px-4 rounded hover:bg-blue-500 hover:text-white transition">პარამეტრები</a></li>
          <li><a href="#" class="block py-2 px-4 rounded hover:bg-blue-500 hover:text-white transition">გამოსვლა</a></li>
        </ul>
      </nav>
      <div class="mt-auto">
        <button class="w-full bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600 transition">დაეწყე ახალი პროექტი</button>
      </div>
    </aside>

</body>
</html>
