<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    html {
        font-size: 20px; ;
    }
    h1 {
      font-size: 2rem; 
      color: darkblue;
    }

    p {
      font-size: 1.5rem; 
      color: darkgreen;
    }

    .wrapper {
      font-size: 10px; 
      border: 1px solid gray;
      padding: 10px;
      margin-top: 20px;
    }

    .wrapper button {
      font-size: 2em;  
      padding: 10px;
      background: tomato;
      color: white;
      border: none;
      border-radius: 5px;
    }
</style>
<body>
  <h1>Hello World</h1>
  <p>Hello World</p>

  <div class="wrapper">
    <p>Hello World</p>
    <button>button</button>
</body>
</html>
