<!-- 3)შექმენი 3 ბლოკი (div).
თითოეულს მისწერე სიგანე სხვადასხვა px-ში (მაგ: 100px, 200px, 300px).
ყველა ბლოკს მიეცი განსხვავებული ფონი.
შეამოწმე, იცვლება თუ არა მათი ზომა ეკრანის გაწევისას. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box1 {
        width: 100px;
        height: 100px;
        background: rebeccapurple
    }
    .box2 {
        width: 200px;
        height: 100px;
        background: rgb(0, 110, 255);
    }
    .box3 {
        width: 300px;
        height: 100px;
        background: rgb(128, 0, 68);
    }

</style>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
