<!--1) კვადრატული ბლოკები
შექმენი 3 ბლოკი (div).
ყველა უნდა იყოს კვადრატი.
სიგანე გაუწერე განსხვავებული: 100px, 150px, 200px.
გამოიყენე aspect-ratio.
ყველას ფონი უნდა ჰქონდეს განსხვავებული. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box1 {
      width: 100px;
      aspect-ratio: 1/1; 
      background: rgb(149, 17, 17);
    }
    .box2 {
      width: 150px;
      aspect-ratio: 1/1;
      background: rgb(166, 0, 255);
    }
    .box3 {
      width: 200px;
      aspect-ratio: 1/1;
      background: rgb(94, 102, 152);
    }
</style>
<body> 
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
</body>
</html>
