<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Summary Component</title>
  <link rel="stylesheet" href="hw.css">
</head>
<body>

  <div class="card">
    <img class="img"
         src="Screenshot_4-1-2026_215034_.jpeg"
         alt="Order summary image">

    <div class="content">
      <h1 class="title">Order Summary</h1>
      <p class="description">
        You can now listen to millions of songs, audiobooks, and podcasts
        on any device anywhere you like!
      </p>

      <div class="plan">
        <div class="song">
          <img src="Screenshot_4-1-2026_215318_.jpeg"
               alt="Music icon">
          <div>
            <div class="plan-name" id="planName">Annual Plan</div>
            <div class="plan-price" id="planPrice">$59.99/year</div>
          </div>
        </div>
        <button class="plan-change" id="changePlan">Change</button>
      </div>

      <button class="btn btn-primary">Proceed to Payment</button>
      <button class="btn btn-cancel">Cancel Order</button>
    </div>
  </div>

  <script src="hw.js"></script>
</body>
</html>
