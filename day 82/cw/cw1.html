<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Links Profile</title>
  <style>
    /* General Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .profile-card {
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 10px;
      text-align: center;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .profile-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
    }

    .profile-card h2 {
      margin-bottom: 0.3rem;
    }

    .profile-card p.location {
      color: #a8ff00;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .profile-card p.bio {
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      color: #ccc;
    }

    .profile-card .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .profile-card .buttons a {
      display: block;
      padding: 0.7rem;
      background-color: #2a2a2a;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    .profile-card .buttons a:hover {
      background-color: #3a3a3a;
    }

    /* Media Query for mobile */
    @media (max-width: 400px) {
      .profile-card {
        width: 90%;
        padding: 1.5rem;
      }

      .profile-card img {
        width: 80px;
        height: 80px;
      }

      .profile-card .buttons a {
        padding: 0.6rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img src="avatar-jessica.jpeg" alt="Jessica Randall">
    <h2>Jessica Randall</h2>
    <p class="location">London, United Kingdom</p>
    <p class="bio">"Front-end developer and avid reader."</p>
    <div class="buttons">
      <a href="#">GitHub</a>
      <a href="#">Frontend Mentor</a>
      <a href="#">LinkedIn</a>
      <a href="#">Twitter</a>
      <a href="#">Instagram</a>
    </div>
  </div>
</body>
</html>
