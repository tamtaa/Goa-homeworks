<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="box"></div>

<style>
 
  .box {
    width: 200px;
    height: 200px;
  }

 
  @media (max-width: 599px) {
    .box {
      background: blue;
    }
  }

 
  @media (min-width: 600px) {
    .box {
      background: green;
    }
  }
</style>

</body>
</html>
