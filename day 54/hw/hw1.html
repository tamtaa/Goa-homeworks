<body>
<!-- placeholder სტილავს იმ ტექსტს რაც ჩნდება input-ის შიგნით მანამ სანამ მომხმარებელი რამეს ჩაწერს -->
 <!-- focus მაშინ სტილავს ელემენტს როცა ის აქტიურია როდესაც მომხმარებელი რამის ჩაწერას დაიწყებს -->
