<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
<!-- level 86:
1) შექმენი ბლოკი რომელსაც ექნება ჩრდილი (shadow). სცადე სხვადასხვა ზომის ჩრდილები და შეადარე ვიზუალურად. -->
<div class="m-10 p-10 bg-white shadow-md">
    hello world
</div>

<div class="m-10 p-10 bg-white shadow-lg">
  hello world
</div>

<div class="m-10 p-10 bg-white shadow-sm">
    hello world
</div>

<div class="m-10 p-10 bg-white shadow-xl">
  hello world
</div>
<!-- 2) გააკეთე ბარათი (card) სადაც გამოყენებულია ფონის gradient. ტექსტი უნდა იყოს მკაფიო და წაკითხვადი. -->
 <div class="m-10 p-10 rounded-lg bg-gradient-to-r from-blue-400 to-cyan-300 text-white font-semibold">
    hello world
</div>

<!-- 3) შექმენი ღილაკი რომელსაც ექნება მომრგვალებული კუთხეები (rounded). სცადე სხვადასხვა დონე — მცირედან სრულ წრემდე. -->
<button class="m-10 px-4 py-2 bg-blue-500 text-white rounded-sm">
    hello world

</button>

<button class="m-10 px-4 py-2 bg-green-500 text-white rounded-md">
  hello world
</button>

<button class="m-10 px-4 py-2 bg-purple-500 text-white rounded-full">
  hello 
</button>
<!-- 4) გააკეთე ბლოკი, რომელიც hover-ზე შეიცვლის ფერს. დამატებით შეცვალე ტექსტის ფერიც hover მდგომარეობაში. -->
<!-- 5) დაამატე transition ეფექტი ღილაკზე ისე, რომ hover-ის დროს ფერის ცვლილება იყოს плавный (არ იყოს მკვეთრი). სცადე სხვადასხვა სიჩქარე. -->
  <div class="p-6 bg-gray-200 text-gray-800 hover:bg-gray-800 hover:text-white rounded-lg transition-colors duration-300">
  </div>
  <div class="flex space-x-2">
    <button class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-700 transition-colors duration-300">
        hello
    </button>
    <button class="px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-700 transition-colors duration-700">
      700ms
    </button>
    <button class="px-4 py-2 bg-purple-500 text-white rounded-md hover:bg-purple-700 transition-colors duration-1000">
      1000ms
    </button>
  </div>
<!-- 6) შექმენი responsive ბლოკი, რომელიც მობილურზე ერთ სვეტად გამოჩნდება, ხოლო დიდ ეკრანზე ორ ან სამ სვეტად. -->
   <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div class="bg-blue-200 p-6 text-center rounded">hello</div>
    <div class="bg-green-200 p-6 text-center rounded">hello</div>
    <div class="bg-purple-200 p-6 text-center rounded">hello</div>
    <div class="bg-pink-200 p-6 text-center rounded">hello</div>
    <div class="bg-yellow-200 p-6 text-center rounded">hello</div>
    <div class="bg-gray-300 p-6 text-center rounded">hello</div>
  </div>

<!-- 7) გააკეთე grid განლაგება 6 ელემენტით. სხვადასხვა ეკრანზე სვეტების რაოდენობა უნდა იცვლებოდეს. -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
    <div class="bg-blue-400 p-4 text-white text-center rounded">hello</div>
    <div class="bg-green-400 p-4 text-white text-center rounded">hello</div>
    <div class="bg-purple-400 p-4 text-white text-center rounded">hello</div>
    <div class="bg-pink-400 p-4 text-white text-center rounded">hello</div>
    <div class="bg-yellow-400 p-4 text-white text-center rounded">hello</div>
    <div class="bg-gray-400 p-4 text-white text-center rounded">hello</div>
  </div>

<!-- 8) შექმენი flex კონტეინერი, სადაც ელემენტები განლაგდება ჰორიზონტალურად და იქნება სივრცე მათ შორის. -->
  <div class="flex justify-between bg-gray-100 p-4 rounded">
    <div class="bg-blue-400 p-4 text-white rounded">hello</div>
    <div class="bg-gerrn-400 p-4 text-white rounded">hello</div>
    <div class="bg-red-400 p-4 text-white rounded">hello</div>
  </div>
<!-- 9) გააკეთე flex განლაგება, სადაც ელემენტები ცენტრში იქნება განთავსებული როგორც ჰორიზონტალურად, ასევე ვერტიკალურად. -->
   <div class="flex items-center justify-center h-40 bg-gray-200 rounded">
    <div class="bg-pink-400 p-6 text-white rounded">hello</div>
  </div>

<!-- 10) შექმენი ბარათების grid, სადაც თითოეულ ბარათს ექნება rounded კუთხეები, shadow, hover ეფექტი და transition. -->
   <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-xl hover:bg-blue-100 transition-all duration-300">
        hello
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-xl hover:bg-green-100 transition-all duration-300">
      hello
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-xl hover:bg-purple-100 transition-all duration-300">
      hello 
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-xl hover:bg-pink-100 transition-all duration-300">
      hello
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-xl hover:bg-yellow-100 transition-all duration-300">
      hello
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-xl hover:bg-gray-100 transition-all duration-300">
      hello
    </div>
  </div>
</body>
</html>
