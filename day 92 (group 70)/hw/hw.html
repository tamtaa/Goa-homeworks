<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tailwind Tasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 space-y-10">

  <!-- 5) Responsive Title with clamp -->
  <h1 class="text-center font-bold" style="font-size: clamp(20px, 5vw, 50px);">
    Responsive Title
  </h1>

  <!-- 1) Card with group hover -->
  <div class="group max-w-sm bg-white rounded-xl shadow-md overflow-hidden cursor-pointer">
    <div class="overflow-hidden">
      <img src="https://www.google.com/imgres?q=image&imgurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fwp-content%2Fuploads%2F2020%2F07%2Fimage-optimisation-scaled.jpg&imgrefurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fhow-to-optimise-images&docid=dTbNgrJF6xXg5M&tbnid=s_UYcOUl07ucGM&vet=12ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB..i&w=2560&h=1707&hcb=2&ved=2ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB"
           class="w-full transition-transform duration-300 group-hover:scale-110">
    </div>
    <div class="p-4">
      <h2 class="text-xl font-bold transition-colors duration-300 group-hover:text-blue-500">
        Card Title
      </h2>
      <p class="text-gray-600 line-clamp-2">
        This is a long description text that should be cut after two lines and show dots if it overflows.
      </p>
    </div>
  </div>

  <!-- 2) Button with icon + group-hover -->
  <button class="group flex items-center gap-2 bg-gray-200 px-4 py-2 rounded-lg">
    <span class="transition-transform duration-300 group-hover:translate-x-1">➡️</span>
    <span class="transition-colors duration-300 group-hover:text-black text-gray-600">
      Click Me
    </span>
  </button>

  <!-- 3) Password input with peer -->
  <div class="w-64">
    <input type="password" placeholder="Password"
           class="peer w-full border p-2 rounded"
           required>
    <p class="text-red-500 text-sm mt-1 invisible peer-invalid:visible">
      Password is required
    </p>
  </div>

  <!-- 4) Checkbox with peer-checked -->
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="checkbox" class="peer hidden">
    <span class="peer-checked:text-blue-500 peer-checked:font-bold">
      Subscribe to newsletter
    </span>
  </label>

  <!-- 6) Button with ring -->
  <button class="px-4 py-2 bg-blue-500 text-white rounded-lg 
                 hover:ring-4 hover:ring-blue-300 
                 focus:ring-4 focus:ring-blue-300 transition">
    Ring Button
  </button>

  <!-- 7) Scroll snap images -->
  <div class="flex overflow-x-auto snap-x snap-mandatory gap-4 p-4 bg-white rounded-lg">
    <img src="https://www.google.com/imgres?q=image&imgurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fwp-content%2Fuploads%2F2020%2F07%2Fimage-optimisation-scaled.jpg&imgrefurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fhow-to-optimise-images&docid=dTbNgrJF6xXg5M&tbnid=s_UYcOUl07ucGM&vet=12ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB..i&w=2560&h=1707&hcb=2&ved=2ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB"
         class="snap-center flex-shrink-0 w-64 h-40 object-cover rounded-lg">
    <img src="https://www.google.com/imgres?q=image&imgurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fwp-content%2Fuploads%2F2020%2F07%2Fimage-optimisation-scaled.jpg&imgrefurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fhow-to-optimise-images&docid=dTbNgrJF6xXg5M&tbnid=s_UYcOUl07ucGM&vet=12ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB..i&w=2560&h=1707&hcb=2&ved=2ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB"
         class="snap-center flex-shrink-0 w-64 h-40 object-cover rounded-lg">
    <img src="https://www.google.com/imgres?q=image&imgurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fwp-content%2Fuploads%2F2020%2F07%2Fimage-optimisation-scaled.jpg&imgrefurl=https%3A%2F%2Fwww.bigfootdigital.co.uk%2Fhow-to-optimise-images&docid=dTbNgrJF6xXg5M&tbnid=s_UYcOUl07ucGM&vet=12ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB..i&w=2560&h=1707&hcb=2&ved=2ahUKEwiZrceBsM2TAxW_Q_EDHaeFIPIQnPAOegQIFxAB"
         class="snap-center flex-shrink-0 w-64 h-40 object-cover rounded-lg">
  </div>

</body>
</html>
