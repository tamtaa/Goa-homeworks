<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title></title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 space-y-10">

  <!-- 1) FLEX CONTAINER -->
  <div class="flex justify-center gap-6">
    <div class="bg-red-400 p-6 rounded-xl">1</div>
    <div class="bg-blue-400 p-6 rounded-xl">2</div>
    <div class="bg-green-400 p-6 rounded-xl">3</div>
    <div class="bg-yellow-400 p-6 rounded-xl">4</div>
  </div>



  <!-- 2) GRID 8 CARD -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">
    <div class="bg-white p-6 rounded-xl shadow">Card 1</div>
    <div class="bg-white p-6 rounded-xl shadow">Card 2</div>
    <div class="bg-white p-6 rounded-xl shadow">Card 3</div>
    <div class="bg-white p-6 rounded-xl shadow">Card 4</div>
    <div class="bg-white p-6 rounded-xl shadow">Card 5</div>
    <div class="bg-white p-6 rounded-xl shadow">Card 6</div>
    <div class="bg-white p-6 rounded-xl shadow">Card 7</div>
    <div class="bg-white p-6 rounded-xl shadow">Card 8</div>
  </div>
  


  <!-- 3) RESPONSIVE TEXT -->
  <p class="text-sm sm:text-lg lg:text-2xl font-bold">
    ეს არის responsive ტექსტი
  </p>


  <!-- 4) ARBITRARY VALUES -->
  <div class="bg-purple-400 w-[250px] h-[150px] m-[30px] p-[25px] text-white">
    Custom ზომები
  </div>


  <!-- 5) OVERLAY -->
  <div class="relative w-64 h-40 bg-gray-300">
    <div class="absolute top-6 left-6 w-40 h-24 bg-blue-500"></div>
  </div>



  <!-- 6 -->
  <div class="flex flex-wrap gap-4">
    <div class="bg-red-300 p-4">1</div>
    <div class="bg-blue-300 p-4">2</div>
    <div class="bg-green-300 p-4">3</div>
    <div class="bg-yellow-300 p-4">4</div>
    <div class="bg-purple-300 p-4">5</div>
    <div class="bg-pink-300 p-4">6</div>
    <div class="bg-indigo-300 p-4">7</div>
  </div>


  <!-- 7. -->
  <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-4">
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
    <div class="bg-gray-400 h-24 hover:bg-black"></div>
  </div>

</body>
</html>
