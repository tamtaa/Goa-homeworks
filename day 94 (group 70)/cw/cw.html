<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
<!-- 1) შექმენი მარტივი ფორმა 3 სექციით:
ინფორმაცია (სახელი, გვარი)
კონტაქტი (email, ტელეფონი)
დამატებითი ინფორმაცია (textarea) 
ფორმას გაუკეთე ლამაზი დიზაინი Tailwind-ით (spacing, border, focus effects).-->
<!-- 2) იმავე ფორმაში დაამატე input-ებზე focus ეფექტები (მაგ. focus:ring, focus:border) და შეცვალე ფერები შენი custom theme-დან. -->
<!-- 3) ფორმის ბოლოში დაამატე submit ღილაკი, რომელსაც ექნება hover და active ეფექტები (scale, color change). ასევე გამოიყენე transition, რომ ანიმაცია იყოს გლუვი. -->

<form class="max-w-xl mx-auto bg-gradient-to-r from-indigo-50 via-purple-50 to-pink-50 p-10 rounded-3xl shadow-2xl space-y-8">
        
    <div>
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Log In</h2>
        <div class="space-y-4">
            <input type="text" placeholder="სახელი"
            class="w-full p-4 border border-gray-300 rounded-xl 
            focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition shadow-sm hover:shadow-md">
            <input type="text" placeholder="გვარი"
            class="w-full p-4 border border-gray-300 rounded-xl 
            focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition shadow-sm hover:shadow-md">
        </div>
    </div>
        
    <div>
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Contact</h2>
        <div class="space-y-4">
            <input type="email" placeholder="Email"
            class="w-full p-4 border border-gray-300 rounded-xl 
            focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition shadow-sm hover:shadow-md">
            <input type="tel" placeholder="Mobile"
            class="w-full p-4 border border-gray-300 rounded-xl 
            focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition shadow-sm hover:shadow-md">
        </div>
    </div>
        
    <div>  
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Info</h2>
        <textarea rows="5" placeholder="Type something..."
        class="w-full p-4 border border-gray-300 rounded-xl 
        focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent transition shadow-sm hover:shadow-md"></textarea>
    </div>
        
    <button type="submit"
    class="w-full bg-primary text-white py-4 rounded-xl font-bold 
    hover:bg-green-600 active:scale-95 transition transform duration-200 shadow-lg hover:shadow-xl">
    Submit
    </button>  
</form>

<!-- 4) დაამატე Tailwind config-ში ორი ახალი ფერი . შემდეგ შექმენი სამი ბლოკი (div), სადაც თითოეულს ექნება განსხვავებული background (primary, secondary, accent) და ტექსტი. თითოეულზე დაამატე hover ეფექტი, რომ ფერი ოდნავ შეიცვალოს. -->
  <div class="grid grid-cols-3 gap-4 mt-10 max-w-xl mx-auto">
    
    <div class="p-6 text-black bg-primary rounded-xl text-center
                hover:bg-green-600 transition">
      Primary
    </div>

    <div class="p-6 text-black bg-secondary rounded-xl text-center
                hover:bg-blue-600 transition">
      Secondary
    </div>

    <div class="p-6 text-black bg-accent rounded-xl text-center
                hover:bg-yellow-500 transition">
      Accent
    </div>

  </div>

<!-- 5) შეცვალე არსებული primary ფერი სხვა მნიშვნელობით (მაგ. მწვანე ან წითელი) და შეამოწმე როგორ იცვლება უკვე გამოყენებული დიზაინი. დაამატე კიდევ ერთი ელემენტი (button), რომელიც იყენებს ამ ახალ ფერს. -->
  <div class="text-center mt-6">
    <button class="bg-primary text-black px-6 py-2 rounded-lg
                   hover:bg-green-600 transition">
      New Button
    </button>
  </div>

<!-- 6) შექმენი სურათების გალერეა (3-4 სურათი), სადაც თითოეულ სურათზე გამოიყენებ Tailwind-ის filters (მაგ. blur, grayscale, brightness). დაამატე hover ეფექტები ისე, რომ მაუსის მიტანისას filter შეიცვალოს (მაგ. blur გაქრეს ან brightness გაიზარდოს). -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-10">

    <img src="🌻.jpg"
      class="rounded-xl blur-sm hover:blur-0 transition duration-300">

    <img src="🌻.jpg"
      class="rounded-xl grayscale hover:grayscale-0 transition duration-300">

    <img src="🌻.jpg"
      class="rounded-xl brightness-50 hover:brightness-100 transition duration-300">

    <img src="🌻.jpg"
      class="rounded-xl contrast-50 hover:contrast-100 transition duration-300">

  </div>
</body>
</html>
