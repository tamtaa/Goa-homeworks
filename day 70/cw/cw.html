<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Tasks Together</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    /* DOM ელემენტებისთვის */
    .box {
      width: 100px;
      height: 100px;
      margin: 10px;
      display: inline-block;
      color: white;
      font-size: 20px;
      text-align: center;
      line-height: 100px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>DOM Elements</h2>
  <div id="myElement">Single Element</div>
  <div class="box" id="box1">1</div>
  <div class="box" id="box2">2</div>
  <div class="box" id="box3">3</div>
  <div class="box" id="box4">4</div>
  <div class="box" id="box5">5</div>
  <div class="box" id="box6">6</div>
  <div class="box" id="box7">7</div>
  <div class="box" id="box8">8</div>
  <div class="box" id="box9">9</div>
  <div class="box" id="box10">10</div>

  <script>
    // -----------------------------
    // 1️⃣ calculator
    const calculator = {
      a: 10,
      b: 5,
      add() { return this.a + this.b; },
      subtract() { return this.a - this.b; },
      multiply() { return this.a * this.b; },
      divide() { return this.a / this.b; }
    };

    console.log("Calculator:");
    console.log("Add:", calculator.add());
    console.log("Subtract:", calculator.subtract());
    console.log("Multiply:", calculator.multiply());
    console.log("Divide:", calculator.divide());
    console.log("----------------------------");

    // -----------------------------
    // 2️⃣ calculatorWithSymbol
    const calculatorWithSymbol = {
      number1: Number(prompt("შეიყვანე პირველი რიცხვი:")),
      number2: Number(prompt("შეიყვანე მეორე რიცხვი:")),
      userSymbol: prompt("შეიყვანე სიმბოლო (+, -, *, /):"),

      calculate() {
        switch (this.userSymbol) {
          case "+": return this.number1 + this.number2;
          case "-": return this.number1 - this.number2;
          case "*": return this.number1 * this.number2;
          case "/": return this.number1 / this.number2;
          default: return "არასწორი სიმბოლო";
        }
      }
    };

    console.log("Calculator with Symbol Result:", calculatorWithSymbol.calculate());
    console.log("----------------------------");

    // -----------------------------
    // 3️⃣ counter
    const counter = {
      count: 0,
      increment() { this.count++; return this; },
      decrement() { this.count--; return this; },
      show() { console.log("Counter:", this.count); return this; }
    };

    counter.increment().increment().decrement().show();
    console.log("----------------------------");

    // -----------------------------
    // 4️⃣ messageBuilder
    const messageBuilder = {
      text: "",
      add(word) { this.text += word + " "; return this; },
      upper() { this.text = this.text.toUpperCase(); return this; },
      print() { console.log("Message:", this.text); return this; }
    };

    messageBuilder.add("hello").add("world").upper().print();
    console.log("----------------------------");

    // -----------------------------
    // 5️⃣ temperature converter
    const temperature = {
      celsius: 25,
      toFahrenheit() { this.fahrenheit = (this.celsius * 9) / 5 + 32; return this; },
      toKelvin() { this.kelvin = this.celsius + 273.15; return this; },
      show() { 
        console.log(`Temperature: ${this.celsius}°C = ${this.fahrenheit}°F = ${this.kelvin}K`);
        return this;
      }
    };

    temperature.toFahrenheit().toKelvin().show();
    console.log("----------------------------");

    // -----------------------------
    // 6️⃣ DOM ელემენტები

    // ერთი ელემენტი ID-ით
    const singleElement = document.getElementById('myElement');
    console.log(singleElement);
    singleElement.style.backgroundColor = "#4CAF50";
    singleElement.style.color = "white";
    singleElement.style.padding = "15px";
    singleElement.style.borderRadius = "10px";
    singleElement.style.fontWeight = "bold";

    // 10 ელემენტი class-ით
    const boxes = document.querySelectorAll('.box');
    console.log(boxes);

    const colors = ["#e74c3c","#3498db","#f1c40f","#2ecc71","#9b59b6","#1abc9c","#e67e22","#34495e","#d35400","#7f8c8d"];
    boxes.forEach((box, index) => {
      box.style.backgroundColor = colors[index];
      box.style.border = "2px solid black";
      box.style.fontWeight = "bold";
    });

  </script>
</body>
</html>
